name: Security Scan

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Informativo — no bloquea. Reporta vulnerabilidades sin romper el workflow.
      - run: npm audit --audit-level=high || true
