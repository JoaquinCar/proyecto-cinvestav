name: Supabase Keepalive

on:
  schedule:
    - cron: "0 8 * * *"  # cada día a las 8am UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query real contra Postgres (cuenta como actividad)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret vacío"
            exit 1
          fi
          psql "$DATABASE_URL" -tAc "SELECT count(*) FROM \"Edicion\";"
          echo "✓ Query ejecutada — proyecto activo"
