name: Supabase Keepalive

on:
  schedule:
    - cron: "0 8 */4 * *"  # cada 4 días a las 8am UTC
  workflow_dispatch:         # también manual desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: psql "$DATABASE_URL" -c "SELECT 1 AS pong;"
